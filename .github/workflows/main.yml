name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ env.IMAGE_TAG }} .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ env.IMAGE_TAG }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to STAGING
        uses: azure/webapps-deploy@v2
        with:
          app-name: SimpleDevProj-staging
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ env.IMAGE_TAG }}

      - name: Tag as stable
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ env.IMAGE_TAG }} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:stable
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:stable


  deploy-production:
    needs: build-and-deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to PRODUCTION
        uses: azure/webapps-deploy@v2
        with:
          app-name: SimpleDevProj
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:stable
